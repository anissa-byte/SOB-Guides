<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw - SOB Guides</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      background: #16213e;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }
    .back-link {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
    .toolbar span {
      color: #9ca3af;
      font-size: 0.9rem;
    }
    .canvas-wrapper {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .canvas-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="../index.html" class="back-link">← Back to guides</a>
    <span>Excalidraw — draw diagrams and sketches</span>
  </div>
  <div class="canvas-wrapper">
    <iframe
      src="https://excalidraw.com"
      title="Excalidraw"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>
</body>
</html>
